name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vitest:
    name: Vitest (lib unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: App/package-lock.json

      - name: Install
        run: npm ci

      - name: Run unit tests
        run: npm test
